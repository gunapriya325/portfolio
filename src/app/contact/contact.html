<section class="contact-section">
  <div class="contact-glow glow-one"></div>
  <div class="contact-glow glow-two"></div>

  <div class="contact-container">
    <div class="contact-content">
      <p class="section-label">Get In Touch</p>

      <h1>Let's work together.</h1>

      <p class="contact-description">
        Have a project idea or want to connect? Send me a message and I will get back to you.
      </p>

      <div class="contact-details">
        <a href="mailto:gunapriya138@gmail.com" class="contact-info">
          <span class="info-icon">✉</span>
          <div>
            <small>Email</small>
            <strong>gunapriya138@gmail.com</strong>
          </div>
        </a>

        <a
          href="https://www.linkedin.com/in/gunapriya-l-9a7077337/"
          target="_blank"
          rel="noopener noreferrer"
          class="contact-info"
        >
          <span class="info-icon">in</span>
          <div>
            <small>LinkedIn</small>
            <strong>Connect with me</strong>
          </div>
        </a>

        <a
          href="https://github.com/Gunapriya325"
          target="_blank"
          rel="noopener noreferrer"
          class="contact-info"
        >
          <span class="info-icon">⌘</span>
          <div>
            <small>GitHub</small>
            <strong>View my projects</strong>
          </div>
        </a>
      </div>
    </div>

    <form class="contact-form" (ngSubmit)="sendMessage()">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input
          id="name"
          name="name"
          type="text"
          placeholder="Enter your name"
          [(ngModel)]="formData.name"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Your Email</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="Enter your email"
          [(ngModel)]="formData.email"
          required
        />
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea
          id="message"
          name="message"
          placeholder="Tell me about your project..."
          [(ngModel)]="formData.message"
          required
        ></textarea>
      </div>

      <button type="submit" class="send-btn">
        Send Message <span>→</span>
      </button>
    </form>
  </div>
</section>
<app-footer></app-footer>
